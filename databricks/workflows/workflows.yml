            - task_key: silver_products
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/gold_transform.py
            base_parameters:
              domain: products
              catalog: ${var.catalog}
              schema: ${var.schema}
          existing_cluster_id: ${var.cluster_id}

    orders_pipeline:
      name: orders_pipeline
      max_concurrent_runs: 1
      tasks:
