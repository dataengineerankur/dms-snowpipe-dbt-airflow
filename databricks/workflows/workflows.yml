resources:
  jobs:
    customers_pipeline:
      name: customers_pipeline
      max_concurrent_runs: 1
      tasks:
        - task_key: bronze_customers
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/bronze_autoloader.py
            base_parameters:
              domain: customers
              catalog: ${var.catalog}
              schema: ${var.schema}
              bucket: ${var.s3_bucket}
          existing_cluster_id: ${var.cluster_id}
        - task_key: silver_customers
          depends_on:
            - task_key: bronze_customers
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/silver_transform.py
            base_parameters:
              domain: customers
              catalog: ${var.catalog}
              schema: ${var.schema}
              bucket: ${var.s3_bucket}
          existing_cluster_id: ${var.cluster_id}
        - task_key: gold_customers
          depends_on:
            - task_key: silver_customers
          notebook_task:
            notebook_path: ${workspace.file_path}/notebooks/gold_transform.py
            base_parameters:
              domain: customers
              catalog: ${var.catalog}
              schema: ${var.schema}
          existing_cluster_id: ${var.cluster_id}

    products_pipeline:
      name: products_pipeline
      max_concurrent_runs: 1
